{%load static%}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexora</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
   <link rel="stylesheet" href="{%static 'CSS/style.css'%}">
  </head>
  <body>
    <nav class = "navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class = "container">
            <a class = "navbar-brand fw-bold" href = "/"><i class="bi bi-journal-bookmark"></i> Nexora</a>
            <button class = "navbar-toggler" type = "button" data-bs-toggle = "collapse" data-bs-target ="#navbarNav">
              <span class = "navbar-toggler-icon"></span>
            </button>
            <div class = "collapse navbar-collapse" id = "navbarNav">
              <ul class = "navbar-nav ms-auto">
                <li class ="nav-item">
                  <a href="/" class= "nav-link text-white ">Home</a>
                </li>
                  {%if request.user.is_authenticated %}
                  <li class ="nav-item">
                  <a href="/profile/" class= "nav-link text-white"><i class="bi bi-person-circle"></i>Profile</a>
                </li>
                   <li class ="nav-item">
                  <a href="/upload/" class= "nav-link text-white">Upload</a>
                </li>
                <li class ="nav-item">
                  <a href="/my_notes/" class= "nav-link text-white">My Notes</a>
                </li>

                  <li class ="nav-item">
                    <a href="/logout/" class = "btn btn-danger">Logout</a>
                  </li>
                  {%else%}
                  <li class ="nav-item">
                  <a href="/register/" class= "nav-link text-white">Register</a>
                </li>
                <li class ="nav-item">
                  <a href="/login/" class= "nav-link text-white">Login</a>
                </li>
                  
                  {% endif %}
              </ul>

            </div>
            
            
        </div>
    </nav>
    {% block content %}

    {% endblock %}
    <footer class = "text-center mt-5">
  <small><i class = "bi bi-journal-bookmark-fill text-primary"></i> 2026 Nexora-Notes Sharing Platform</small>
 </footer>
</body>
</html>
