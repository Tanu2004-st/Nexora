{% extends "base.html" %}
 {% block content %}

<div class = "container mt-5">
    <h2>Edit Profile</h2>
    <form method="POST">
         {% csrf_token %}
         <input type = "text" name = "first_name" value ="{{user.first_name}}" class = "form-control mb-3">
         <input type = "text" name = "last_name" value ="{{user.last_name}}" class = "form-control mb-3">
         <input type = "text" name = "email" value ="{{user.email}}" class = "form-control mb-3">
         <button type = "submit" class ="btn btn-primary">Save Button</button>

    </form>
</div>


 {% endblock %}
