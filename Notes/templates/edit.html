{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Notes</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="{%static 'CSS/style.css'%}">
    </head>
<body>
    <nav class = "navbar navbar-dark bg-primary mb-4">
        <div class = "container">
            <a class = "navbar-brand" href="/">Nexora</a>
        </div>
    </nav>
    <div class = "container mt-5">
        <div class = "form-box">
        <h1 class = "main-heading">Upload Notes</h1>
    <form method = "POST"  enctype ="multipart/form-data">
        {% csrf_token %}
        <label >Title</label>
        <input type="text" name="title"  value = "{{note.title}}" class ="form-control">
        <br><br>
        <label >Subject</label>
        <input type="text" name="subject" value = "{{note.subject}}">
        <br><br>
        <label >Description</label>
        <textarea name="description" class = "form-control">{{note.description}}</textarea>
        <br><br>
        <label >Author</label>
        <input type="text" name = "author" value="{{note.author}}">
        <br><br>
        <label >PDF File</label>
        <input type="file" name = "file" class= "form-control">
        <br><br>
        <button type = "submit" class = "btn btn-success">Save Changes</button>
    </form>
</div>
 </div>   
    
</body>
</html>
